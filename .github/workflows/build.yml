name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & smoke test
    runs-on: windows-latest
    permissions:
      contents: write  # needed for the release step on tag pushes
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags, so the CHANGELOG-extraction step below can find the previous tag for the "Full Changelog" compare link

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Compile statusline.exe
        shell: cmd
        run: cl /nologo /O2 /MT /W3 /D_CRT_SECURE_NO_WARNINGS /Fe:statusline.exe statusline.c /link /SUBSYSTEM:CONSOLE

      - name: Verify binary exists
        shell: cmd
        run: dir statusline.exe

      - name: Smoke test (pipe mock JSON through binary)
        shell: cmd
        run: type test\mock.json | statusline.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: statusline-exe
          path: statusline.exe
          if-no-files-found: error

      - name: Build release body from CHANGELOG.md (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $version = $tag.TrimStart('v')
          $changelog = Get-Content CHANGELOG.md -Raw

          # Grab everything under "## [<version>] ..." up to the next "## [" heading (or end of file).
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\][^\r\n]*\r?\n(.+?)(?=^## \[|\z)"
          $match   = [regex]::Match($changelog, $pattern)
          if (-not $match.Success) {
            Write-Error "No CHANGELOG.md section found for version $version. Add one under '## [$version]' before tagging."
            exit 1
          }
          $body = $match.Groups[1].Value.Trim()

          # Append a Full Changelog compare link to the previous tag, if one exists.
          $prevTag = git tag --list 'v*' --sort=-version:refname | Where-Object { $_ -ne $tag } | Select-Object -First 1
          if ($prevTag) {
            $body += "`n`n**Full Changelog**: https://github.com/${{ github.repository }}/compare/$prevTag...$tag"
          }

          $body | Set-Content -Path release-body.md -Encoding utf8
          Write-Host "=== release-body.md ==="
          Get-Content release-body.md

      - name: Attach binary to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: statusline.exe
          body_path: release-body.md
          fail_on_unmatched_files: true
