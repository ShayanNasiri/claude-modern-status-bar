name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & smoke test
    runs-on: windows-latest
    permissions:
      contents: write  # needed for the release step on tag pushes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Compile statusline.exe
        shell: cmd
        run: cl /nologo /O2 /MT /W3 /D_CRT_SECURE_NO_WARNINGS /Fe:statusline.exe statusline.c /link /SUBSYSTEM:CONSOLE

      - name: Verify binary exists
        shell: cmd
        run: dir statusline.exe

      - name: Smoke test (pipe mock JSON through binary)
        shell: cmd
        run: type test\mock.json | statusline.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: statusline-exe
          path: statusline.exe
          if-no-files-found: error

      - name: Attach binary to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: statusline.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
